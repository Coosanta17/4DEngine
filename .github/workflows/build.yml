name: Build

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]

    runs-on: ${{ matrix.os }}

    env:
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.os == 'windows-latest' && 'x64-windows' || 'x64-linux' }}
      VCPKG_FEATURE_FLAGS: "manifests"
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg_installed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl zip unzip tar \
            ninja-build \
            build-essential \
            autoconf \
            automake \
            autoconf-archive \
            libtool \
            libltdl-dev \ 
            pkg-config \ 
            libx11-dev libxft-dev libxext-dev \
            libwayland-dev libxkbcommon-dev libegl1-mesa-dev \ 
            libibus-1.0-dev

      - name: Install Ninja (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install ninja

      - name: Set up MSVC
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Ensure vcpkg_installed exists
        run: mkdir -p ${{ github.workspace }}/vcpkg_installed

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_installed
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Clone vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git

      - name: Bootstrap vcpkg (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: ./vcpkg/bootstrap-vcpkg.sh

      - name: Bootstrap vcpkg (Windows)
        if: matrix.os == 'windows-latest'
        run: .\vcpkg\bootstrap-vcpkg.bat

      - name: Configure (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Configure (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build --parallel

      - name: Upload Linux
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: 4DEngine-linux
          path: build/4DEngine

      - name: Upload Windows
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: 4DEngine-windows
          path: |
            build/4DEngine.exe
            build/SDL2.dll
